name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set version
        run: echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_ENV

      - name: Build binary
        run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -o build/forxi ./cmd/server
          chmod +x build/forxi

      - name: Prepare dist directory
        run: |
          mkdir -p dist/configs
          cp build/forxi dist/
          cp configs/config.prod.yaml dist/configs/

      - name: Create tar.gz package
        run: |
          tar -czf forxi-$VERSION-linux-amd64.tar.gz dist

      - name: Create Tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag $VERSION
          git push origin $VERSION

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: forxi-${{ env.VERSION }}-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
