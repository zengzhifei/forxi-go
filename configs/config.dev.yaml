server:
  port: 8080
  mode: debug
  read_timeout: 60
  write_timeout: 60

database:
  driver: mysql
  host: localhost
  port: 3306
  username: root
  password: ""
  database: forxi
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 20
  conn_max_lifetime: 3600

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  prefix: "forxi"

jwt:
  secret: ${JWT_SECRET}
  access_expire: 24
  refresh_expire: 30
  issuer: forxi-go-dev

oauth:
  frontend_callback_url: http://localhost:5173/oauth/callback
  password_reset_url: http://localhost:5173/reset-password
  github:
    client_id: ${OAUTH_GITHUB_CLIENT_ID}
    client_secret: ${OAUTH_GITHUB_CLIENT_SECRET}
    redirect_url: http://localhost:8080/api/oauth/github/callback
    user_info_url: https://api.github.com/user

email:
  smtp_host: smtp.qiye.aliyun.com
  smtp_port: 465
  username: platform@forxi.cn
  password: ${EMAIL_PASSWORD}
  from_email: platform@forxi.cn
  from_name: Forxi

log:
  level: debug
  filename: logs/app.log
  max_size: 100
  max_backups: 10
  max_age: 15

rate_limit:
  qps: 100
  burst: 10